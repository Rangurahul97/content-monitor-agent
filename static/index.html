<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Monitor — AI-Powered Social Feed</title>
    <meta name="description" content="AI-powered social media content monitor dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0a1a">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">Content Monitor</span>
            </div>
        </div>
        <div class="header-center">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="searchInput" placeholder="Search content..." autocomplete="off">
            </div>
        </div>
        <div class="header-right">
            <div class="status-indicator" id="statusIndicator">
                <span class="status-dot"></span>
                <span class="status-text">Online</span>
            </div>
            <button class="notification-bell" id="notifBell" title="Enable notifications">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <span class="notif-badge" id="notifBadge">0</span>
            </button>
        </div>
    </header>

    <!-- Stats Bar -->
    <section class="stats-bar" id="statsBar">
        <div class="stat-card">
            <span class="stat-number" id="statTotal">0</span>
            <span class="stat-label">Total Tracked</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="statYoutube">0</span>
            <span class="stat-label">📺 YouTube</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="statInstagram">0</span>
            <span class="stat-label">📸 Instagram</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="statTwitter">0</span>
            <span class="stat-label">🐦 Twitter</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="statImportance">-</span>
            <span class="stat-label">Avg Score</span>
        </div>
    </section>

    <!-- Filter Tabs -->
    <section class="filters">
        <div class="filter-tabs">
            <button class="filter-tab active" data-platform="all">All</button>
            <button class="filter-tab" data-platform="youtube">
                <span class="tab-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></span> YouTube
            </button>
            <button class="filter-tab" data-platform="instagram">
                <span class="tab-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg></span> Instagram
            </button>
            <button class="filter-tab" data-platform="twitter">
                <span class="tab-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></span> Twitter
            </button>
        </div>
        <div class="sort-controls">
            <select id="sortSelect">
                <option value="latest">⏰ Latest First</option>
                <option value="importance">🔥 Most Important</option>
            </select>
        </div>
    </section>

    <!-- Feed -->
    <main class="feed-container">
        <div class="feed" id="feedContainer">
            <!-- Cards rendered by JS -->
        </div>
        <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <p>Loading content...</p>
        </div>
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">📡</div>
            <h3>No content yet</h3>
            <p>The agent is monitoring for new posts. Check back soon!</p>
        </div>
    </main>

    <!-- Content Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="detailModal">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-content" id="modalContent">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="/static/js/firebase-config.js"></script>

    <script src="/static/js/app.js"></script>
</body>
</html>
